body:
  text: 嶺南風物記湖州府知府吳綺撰嶺南節氣大抵與江南較早三月江南春時其風自下而上故清明可放紙鳶若嶺南則十月十一月可放春時反不能上此一驗也嶺南天氣常如三四月時夏多雨則不熱秋無雨則甚熱東坡云四時皆似夏一雨便成秋許丁卯集云江南帶日秋偏熱海雨隨風夏亦寒皆實録也端溪在肇慶羚羊峽硯石産老坑有三洞曰西曰東曰中西勝於中中勝於東大抵坑之上層為天花板燥而不佳最低者為沙板雖細亦不佳惟中層水岩細軟純滑斯為佳品羊肝色為上次青花鸜鵒眼火烙紋蕉葉白再次水紋古塔岩石色雖純而其眼如黃蠟中無晴㸃朝天岩雖有蕉葉白火烙紋然紅黑而不艷石中帶微白星此岩俱在峽山左右亞婆坑在靈山寺後雖有蕉白火烙然石甚粗其眼如黃泡非佳品也若屏風背石色純黑無光艷市估所售者俱係此石又有梅花坑粗燥不堪眼如黃豆惟可用以礪刃耳大抵各洞皆有眼惟黃龍則老坑始有之辨者取以為硯然皆石之病耳或曰端石視之如有沙鋪其面而抹之則甚細滑且有青花者為上其青花亦有辨石中隱隱有青紋一片以水拭而方見者真青花也若青㸃散亂者非英石出韶州府英德縣峰紋聳秀扣之有金玉聲為佳而其要有三曰皺漏瘦皺謂紋理波折漏謂洞壑玲瓏瘦謂峰巒秀削備此三者方見硯山全德矣宋長白曰研山之玩創自南宫按浛洭縣自英德遡流而上西去百有餘里元章作尉於此袖中把弄實浛洭所産後因其地并入英德世人遂誤傳為英石而市估所售皆贋物也余嘗三過浛洭覽其遺址元章墨池大字猶在焉惟研山杳不可得詢之土人以溪流暴漲必俟秋深水涸於沙坑淘取所謂脫沙者是也瞻望憮然留題石壁而去星巖石出肇慶府七星巖白質青紋亦有如山水狀者可飾几案屏榻頗類大理但稍脆耳其白者碎之婦人可以塗面粵東閨中多用之蠟石色黃如蠟亦有峰巒形勝大似黃子久筆意長徑數尺小不盈掬溫潤可觀嶺南特重之嫩石出南雄府琢之可為釜畫眉石出惠州府婦人可用畫眉石墨出南雄府始興縣小溪中長短似墨人或取以畫眉紫石英出東莞縣爆山舊以貢獻大如指頭小如石榴子明徹如水晶光澤紫艷可愛爆山之鄉名周家村翟姓聚族而居離城十五里許土人得石英饋遺或以飾帶飾器亦入藥用療婦人絶孕至十年無子者修治服食輕身延年碣石衛北五里𤣥武山上有三台石如品字後忽裂縫內有字云一拳打破三台石後有霸占二十秋時衛官張一權方到即有蘇利之變據此凡二十載蓋應於此衛西北五里道旁有石形如犀牛昂首仰望其南山上一石圓如月俗謂犀牛望月丹竈泥出羅浮葛洪煉丹處泥如小彈丸紅黃色拾歸可療心痛與不服水土之病以一丸置杯水中忽旁泡起纍纍有煙滚滚上衝水靣須臾泥方消散玲瓏岩出南雄府始興縣洞中有獅象二石大如几案其白如雪相去丈許宛如獅象之形土人取獅石一塊象石一塊放醋盤中相去尺許輒能相就離之復合木棉花出廣州葉如單葉茶花大如茶鍾口花時無葉其色赤高可數丈遠望如百尺丹霞亭亭可愛實即攀枝花每挺七葉其棉輕軟可作坐裀佛桑花出廣州其枝葉如桑花似芍藥稍小色有數種單葉花似葵惟大紅者極可愛宋長白曰佛桑即扶桑也移根海外閩中最佳嘗於溫陵洪文襄宅見有髙至丈餘者其花如斗不减洛陽萬歲紅馬纓丹出廣州府花如江南繡毬花四出但不圓耳色大紅鮮妍可愛即將衰卸垂垂亦如珊瑚家制府異其名曰珊瑚毬殊為雅稱矣金鳳花出廣州府一名孔雀花四瓣金黃色首尾兩翼皆全宛如鳳凰飛翥狀其尾修長尤似鐵樹花出瓊州府樹止一二尺葉密而紅指甲花出廣州本大如佛桑花黃白色一花數出清香甚婦人採其葉用礬石染指甲鮮艷奪目詩云彈箏亂落桃花片是也俗呼九里香桃花出瓊南二八月兩放皆實海漆出瓊州海上有花如芍藥曰倒粘子漬以為膠可代柿漆素馨花出廣州府自西國移植不變水土相傳素馨乃女子名以相思而死其墓上産此故其香染人衣袂不易散也廣州城南有花田僞漢劉鋹葬美人於此此種尤多土人取花結為綵燈亦風艷有致丫蘭出羅浮花大而白枝上復生一枝故曰丫蘭次者為出架白又次者青蘭又次者為秋露白其花短小最下者名金枝玉葉其花紅色樹蘭出廣府一名魚子蘭六七月作花纍纍如金粟芳烈異常土人多用作香并入茶中紗葉出廣州府光孝寺即菩提葉肇慶天寧寺皆有之光孝者尤大而佳六七月間取其葉以少石灰水浸之二十日則膚去斤存竟如紗縠土人以之作燈併為婦人叉鉺之屬如金絲然也符竹出羅浮山葛洪居山偶書符竹葉上以壓山精今竹葉上每葉皆有一符作黃白色筆書宛然山中人常以贈客云藏之可以辟邪菊花出瓊南四時皆放棉花樹出瓊南可髙五六尺茄樹出瓊南可髙四五尺月月紅出瓊州有樹髙丈餘者知風草出瓊州土人視節知一歲颶風之候每一節一風無節無風茉莉花出廣州花田中有千葉者土人至夏秋之交取之穿篾作燈毬晚以燃燭香色皆異常若明珠光潔而酷烈尤甚肇慶亦有之卍字果出廣州亦名蓬鬆果樹本髙數丈桄榔果作卍字形字畫方正蒂在卍字之中生食香甘可口萬年松出羅浮水石澗中拾歸同沙水栽盛即乾置書籍中數十年枯朽後旦以水沃之不過二三日青緑生長如故人面子出廣州核如人面肇慶府羚羊峽內有春海棠花樣如秋海棠惟葉上有刺其花帶香芭蕉子出肇慶大小如雞卵一名龍奶味酸甜可食有香其子尤美龍鬚草出廣西懷集德慶州亦出青子連州亦出做席匠人出在肇慶府城對過金渡村波羅蜜出瓊州大如斗剖之味如蜜其香異常形如東瓜皮上有刺如佛頭旋螺文內瓤甚甜每房有核核如青果偏桃果出廣州大如鴨卵色青黃味酸甜可食夢想出雷州不知何木大如鴨卵以其實切片泡湯只用一二片即滿一碗甘美殊異常品君遷樹出廣州俗呼牛奶子張衡西京賦平仲君遷即此樹也優曇鉢出肇慶似枇杷無花而實桬棠果出羅定州其味如李而無核千歲果出肇慶府開平如棐梢大柑出四㑹縣色赤如日其味稍減椰子出瓊州文昌縣者為佳中有漿如酒可飲宜母子出廣州狀如柑鶴膝竹出韶州府如鶴膝然單竹出南雄府練竹為麻可作布龍蔥竹出羅浮山第三十一嶺半是巨竹皆七八圍節長丈餘葉如芭蕉大五子樹出潮州府潮陽縣實如梨有五核可治金創及霍亂秋風子出廣州府斷續藤出肇慶府新興縣山中行渴則取汁飲之號東風菜羅望子出廣州府庵摩勒出廣州府羅漢竹出廣州府鷹爪蘭出廣州府葉如瑞香花似鷹爪可以架植之仙人掌出廣州府龍蘭出韶州府羊齒子出羅定州頻婆果出廣州樹極大果如蠶豆莢子圓如豆藏其中老則迸開如桐瓢狀色大紅土人取其熟食之黃皮果出廣州狀如金菊漿似葡萄但微酸耳核青色形如瓠種多寡不一土人云此果消食更能順氣羊桃果出廣州狀如皂角五片相簇青白色香味如橄㰖而酸澀無核其樹有髙四五丈者大可數圍果有秈糯二種糯者色黃少甜廣人去稜邉切片用生薑榨油用為小菜云可寬胸兼能治瘧蒲葵扇出廣州新㑹縣其製度精巧者一柄可值三兩許其大者五六尺土人以之蔽日凡梅花皆五出惟瓊州者六出豫詩云倍得三分白平添一段香蓋謂此也夀陽粧額益為斌媚矣荔枝至上品者名挂緑亦名緑羅袍次上者名黑葉其他有名紅孩兒十八娘子者大路者進奉者有名尚書懷者相傳楊妃所嗜即此至火山其味甚薄斯為下矣若肇慶新興之香荔味甘而核甚小斯為荔中之神品也宋長白曰荔枝斷以閩中為上若興化漳浦所出瓤極厚而核甚小味正甜嶺南猶在西川之下蔡君謨歐陽永叔荔枝譜辨之詳矣烏㰖出廣州較青果獨大而色正黑核中之仁形如蠶蛹可以作果化州橘紅在州治中廳事前一株有百餘顆取以作藥患痰傷食氣滯者取少許泡湯其效甚速或云以治傷寒不汗者尤妙或云州治外所産不堪入藥土人饋遺皆􅎓物也肇慶有竹一種大者如蘆而質脆葉亦如蘆長尺餘細者則實心頭垂下或亦作花豫於府庠中見之蒼頭云天寧寺後園亦有此竹而多芒刺如薔薇然詢之土人名曰大頭㸃不知出於何種廣州有百日紅俗名丁冬花梗花紅色皆如珊瑚瓣作兩層一層上托一層似和包形開時纍纍倒垂且甚耐久殊可愛玩若江南以紫薇花為百日紅則大異矣髙州府有千葉茉莉花大而香形如白蓮蒲澗相傳安期生得道處也在白雲山下出石菖蒲多九節者道經云餌之可以長生廣州糧道署中有樹名管葉如土牛膝髙可一二十丈大可數圍托根署地而郡城之內咸四望焉蔣少參作軒其下為老樹軒云此樹不知年歲相傳雷擊之者三而不能傷蓋他處所無也孔雀出肇慶府髙要四㑹二縣其尾貯瓶中為玩但蚊喜食之夏月不可出供也金鳳出儋州大如指身五色冠首修尾儼如美人叉上金鳳也秋風鳥出雷州至八月中秋前五日水中魚化為鳥從風而起土人網得肥美可食中秋後則無之故曰秋風鳥潮雞出廣州似雞而小潮至則鳴灰鶴出廣州府五色雀出惠州羅浮山貴人至則先翔舞雲白鳥出肇慶府能辟蛇鵕䴊鳥出肇慶府似山雞其羽有光漢以飾侍中冠杜詩云何須不著鵕䴊冠此也越王鳥出肇慶府似鳶喙勾可受二升似越王烏喙故以為名也五色鳥出羅浮形類鸜鵒五色各異黃白緑黑紅禀五方正色一毛不雜别名五姊妹每年飛繞博羅城隍廟樹翔集一春不窠不雛去他時亦不再至丁髻娘出肇慶府一名鳳頭雀登竿鳥大小毛片皆如燕子惟頭作鳳冠而尾紅小兒養之甚馴不用籠畜每放之一二日復來以飯粒飼之飽則復去去則復來率以為常西洋雞短足昂首其尾拂地與恆種殊異其狗毛長如獅子狀養之馴熟坐立惟人所命烏鴉出儋州以口銜火置人屋上用翅扇焚則羣鳴飛舞至昌化則無喜鵲到感恩鴉亦無矣山呼鳥出廣州府一名珊瑚形似喜鵲能為百鳥之音甚可聽金錢雞出羅定府較家雞甚馴毛羽皆灰色遍身圓圈如太極圖間紅黑色爛然可觀瓊南文昌縣亦有之一名五福鳥凡人家有吉慶事則鼓翅翔舞碧雞出髙州朱冠黃喙紅足毛黑色而有翠光鷓鴣在在有之飛必南向遇霜露時則以木葉自覆其背舟行峽內鈎輈格磔四山爭響宋長白曰草木花鳥皆為地氣所鍾百粵位應南離耀靈炎火故花多紅色鳥喜南翔不特鷓鴣然也余嘗有句云越鳥多南翥蠻花少北枝似亦實録云潜牛出肇慶府江中形似魚能上岸與牛鬬角軟入水則堅果下馬出羅定州髙不踰三尺駿者有兩脊骨又呼雙脊馬健而能行白猿出羅定州長六七寸其身如雪若黑者即墨矣石猴出海南其小如拳可夜宿筆筒中海南山中猴多而難捕捕者用一人懷利刃獨往山中猴欺其寡而羣就之出不意斫得其一羣猴悉不敢動任所拘執矣他處蒼蠅皆無血惟廣州肇慶有之或有滿肚墨水者瓊州府出壁虎能鳴者惠州府有青螺可為杯鸚鵡螺出海南其形如鸚鵡故名製以為杯可容醇醪四兩禾蟲出廣州禾熟時有之長數尺土人斷之亦復成形形如馬蝗以治饌甚鮮然畏而遠之正恐不能下咽也羅浮神蝶産於羅浮蝴蝶洞中不知何時作繭於樹葉山中人出以贈客懸之忩户林木之上至三四月時輒蠕動動久之則出出則伏繭上數日而後翔舞飛集翅如巨掌金碧朱翠爛然奪目約十數日則有他蝶引之而去其出繭時雖極力注視方轉睫間不知其何以出也及其欲去雖籠置密室中倐而不見亦不知其何以去蓋神物也相傳為葛洪妻鮑氏遺衣所化其信然歟宋長白曰舟行自湞江而上漸入三連其地有蟲厥名含毒與北方柏靈相似而更小噆人肌膚痛癢特甚以手搔之輒復壅腫疑是蛇蟲毒氣所化惠州濵海别有二湖一鹹一淡各産小蟹其大如錢以螺殼為房寄居其內名曰寄生好事者捕得就其房之廣狹别以金銀模之蟲見光彩即棄舊巢而居焉貯於香奩紙裹中頗堪把玩間日飼以微物其飲水也必從其鹹淡之宜反是則死嘉魚出肇慶府楊栁沙與䕫州丙穴者相似身白而長肌細少骨但丙穴者以春社出至秋而止肇慶者以秋社出至春而止不可多得也沙魚出雷州府有虎鹿鋸三種海南沙魚暑天上沙灘滚跌踰時即變虎鹿二種其變虎者頂無王字行不能速其變鹿者角無鋒稜至冬月復入水為魚凡魚俱卵生惟沙魚胎生一生必兩毛龜出韶州府大如錢以水浴之其毛披放皆碧緑色置之案頭可辟蠅異龜出廣州曾見一龜大如宫碗口頂有白色如白果形腹下作紅黃色四足有鱗不知何産也黃雀魚出惠州府八月化為雀十月後入水化為魚鱞魚出惠州府大如指長八寸脊骨美滑宜羔巨龜出惠州府背生樹木望之儼如洲渚䱜魚出惠州府海中大盈丈腹有洞貯水養子朝出口暮入臍䱟魚出惠州府亦名狼籍龜魚土肉出惠州府大如小兒臂有腹無口目有三十足如笄簪笄魚出惠州府如笄長尺章魚出潮州府有八足鬼頭魚出韶州鱘龍魚出肇慶府諸地其形魚頭龍腰鼇尾蟹出廣州府二螯八跪後有二扁足其肉少味淡其膠沾殼龍頭蝦出海南惠州等處頭似龍身有金色大者約有十餘斤蕉布出肇慶府屬不結子皮績為布夏月衣之不作汗氣比葛色微黃紵霜布出韶州翁源縣竹布出韶州仁化縣以竹捶取絲績為布即單竹也女兒香出東莞縣馬蹄岡金桔嶺梅林百花洞諸鄉離城四十里土人採香歸家女兒揀選拾其精者而藏之故有女兒之名栽種于清明未雨之前收成於二三十年之後必祖孫父子相繼為業略無近功又擇地土所宜故他鄉罕樹焉香樹葉似樹蘭而叢密覆䕃行人折枝代傘謂之香隂實可榨油燃燈最明黽蟻百蟲不敢近誤觸之斷翼脫足而死性大熱誤入飲食亦令人吐皮堪作紙堅厚過於桑料名曰純皮紙香之身出地上者名曰白木香能辟穢去潮濕香必種十餘年之久然後伐其正身之白木就其正身之近地鑿孔開香門香經伐之後則枝葉旁抽而婆娑益茂經開香門之後則香氣隨雨露所漬趨結於根頭之下矣初年於香門穴中鑿採一片覆以純黃潔土次年則可得二三片年愈久則根頭寬洞成窩出香愈多而味愈永名曰牙香以其形狀如馬之牙也俗人亦呼為香頭牙香中去其連頭蓋底枯槁白木而存留其純粹者曰選香謂經揀選過也選中又選其生結穿胸黑格黃熟馬尾浸者為最上即女兒香矣其次水熟白紋藕衣紋者燒時雖香微帶酸氣如沉速不足貴也何謂生結香香頭根下遇有隙穴受日月霜露漸漬日久結成胎塊而香身不枯受土生氣與之相接名曰生結生結之香曝之烈日其香滿室既有生結必有穿胸之形迹必有黑格之發露蓋穿胸黑格乃生結之徴驗也何謂黃熟香樹不知其幾經數百年本末皆枯朽揉之如泥中存一塊土氣養之黃如金色其氣味靜穆異常亦名熟結至於馬尾浸則香之植朱砂黃土中厯年久而自成者一線光黑如漆浸於香上體質堅凝肌理密實乃香之津液積結而成其氣味與生結等而更悠揚此所以為貴也沉香有活生死結以瓊州為最如外國者不但不可入藥焚之亦無佳味生活結者乃係取之於生樹者死結乃已伐之樹過數十年再取者為死結其功味缺生活結者十之三四矣而名有牛角沉將軍帽雨淋頭菱角殼沙糖結等名總之以生活為上如藥香花剷之數其精脉微細入藥不大佳妙只可借爐火耳宋長白曰沉香入藥最難辨識海南别有一本其質堅紉略帶酸香土人截成方片用鐡條熾熱沃以香水名為夾板入水即沉以鐡氣浸入木理故也若以入藥貽害非淺九里香木本葉如黃楊花似野繡毬色白其香甚烈蓋珍木也桂酒出惠州博羅縣蘇軾有頌猴酒出瓊州土人每在山中得猴酒或在岩石窩內或於半破椰殼內得之問之土人云猴以稻米采草藥共嚼之如人之造酒同一二日即成酒味如淡水燒然亦不多得藤菜出惠州之豐湖可敵蓴菜米豆出雷州海中思靈島一種後數年收實淮南子云豆之至美者界稻出雷州府十月種次年四月熟廣東有米名秋分粘者精美絶倫又有黃芋紅芋香味異於一切鄭儋州尚智為豫言海寇楊二寇瓊州時一庠生方娶婦入門交拜賊突至遂掠入舟婦見賊怒曰我雖猶女子然已為士人妻矣狂賊何敢汚我遂躍入海而死一家埋金於室一婢守之賊入詰其資婢始猶乞哀備受榜掠知不得免乃大聲極罵賊剔其齒斷其舌終不告以金之所在遂至於死二事皆節義之尤者惜其姓氏不傳也進士坊在瓊州臨高縣有進士與知縣不睦竟為知縣滅其家將石坊移於文廟前磨去進士二字鐫黌宫二字在上逺觀之進士二字仍顯明在上人以為寃沉香浦有二一在廣州府西即吳隱之投香處一在瓊州府臨高縣城南時沒時見藍關在惠州新寧縣道旁有昌黎祠祠下有碑大書步雪仙踪四字然其事荒謬殊不可考畫不如樓在連州乃劉禹錫所建也山水佳絶為一境之勝信非名人不能有名地耳朝雲墓在惠州府北門外三里許至今郡人春日遊賞者多至其處前漢伏波將軍祠在連州祀路博德也金花夫人者故女巫也死而靈異有目疾者禱之輒效羊城特尊奉之春時賽㑹與天妃相埓粵俗産男日先以薑酒奉其祖先隨用甘蔗糖兼醋煮薑片請客及饋送親戚鄰里故俗人問人云生男曰何時飲薑酒探人生男曰薑酒曾香未蓋生男則必具薑酒可知矣粵俗婚娶新郎行親迎之禮大家親迎必覔數友敏慧才捷者為伴郎至女家則攔門索詩賦名曰攔詩新郎捉筆伴郎或代之詩賦成然後遣女于歸瓊州五指山中有黎人與土人交易不用銀錢惟用牛布肇髙雷羅山中有猺獞耕於山獵於山不入版籍惟設猺頭以治之耳宋長白曰廣屬三連即古桂陽地也內有八排皆猺所居有生熟之别熟猺供賦不供役生猺則獷悍特甚自稱盤瓠之遺不事耕種惟以揲劫為生昌黎曾令陽山所云好則人怒則獸此類是也獞與猺略同而穴居野處兩類鴟張殆無虗日蓋隱若敵國海口所有神曰班師乃淫女所祀之神若男子欲慕彼女子不得許神願則得海南有黎人其黎女多端妍未許聘時則白面若許聘即以夫家來聘花樣刺之於面終身不易其山有黎老峰頗稱靈怪廣東初行親禮規矩用檳榔富者用檳榔一百斤或三二十斤亦可貧者用四兩半斤以為定親之禮鄉里村間貧者娶親時只用青布一塊包頭再用雨傘一把將新人接回拜堂即此以為完娶之禮嶺南風物記
