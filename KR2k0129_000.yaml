body:
  text: 嶺南風物記地理類八雜記之屬提要臣等謹案嶺南風物記一卷國朝吳綺撰宋俊增補江闓刪訂綺本文士故是書所敘述率簡雅不支與范成大桂海虞衡志可相伯仲首二條敘氣候次十條敘石次六十條敘草木花竹次十七條敘鳥次五條敘獸次六條敘蟲次十七條敘鱗介次三條敘香次二條敘酒次四條敘蔬穀次十五條以雜事附敘於末其敘硯敘香特詳核惟碣石衛品字石一條宜入卷末雜事中殆分段編次偶失序耳俊所增補凡七條皆别識之其論米芾所賞之石本出浛洭縣地秋深水涸之時於沙坑中取之謂之脫沙後浛洭併入英德遂以英德石當之實皆􅎓物亦前人所未發惟闓所刪者今不復見其刋除當否遂不可考矣綺有林惠集别著録俊字長白山陰人闓字辰六貴陽人也乾隆四十五年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:611a68117f668571d32ff791e1f3795d6d5353c8a27cdd804cec7e59b219ef6b
